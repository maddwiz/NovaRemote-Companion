name: Bug report
description: Report a reproducible bug in Codex Remote
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, install method, and whether NovaAdapt/NovaSpine sidecars are enabled.
