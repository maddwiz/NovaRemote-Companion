<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Codex Remote</title>
    <style>
      :root {
        --bg-0: #04121c;
        --bg-1: #0c2231;
        --surface: rgba(13, 35, 49, 0.94);
        --surface-soft: rgba(10, 28, 40, 0.9);
        --line: #2f546a;
        --line-soft: #234457;
        --text: #e6f4ff;
        --muted: #8dadc0;
        --accent: #0cb6d8;
        --accent-2: #0a8eac;
        --danger: #d43d34;
        --terminal-bg: #04131d;
        --terminal-line: #0d3a4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Avenir Next", "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #0e3f53 0%, transparent 34%),
          radial-gradient(circle at 100% 100%, #184f43 0%, transparent 30%),
          linear-gradient(160deg, var(--bg-0), var(--bg-1));
      }

      .app {
        max-width: 980px;
        margin: 0 auto;
        padding: calc(12px + env(safe-area-inset-top)) 12px calc(14px + env(safe-area-inset-bottom));
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, var(--surface), var(--surface-soft));
        box-shadow: 0 18px 32px rgba(0, 0, 0, 0.22);
        margin-bottom: 10px;
        padding: 12px;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .title {
        margin: 0;
        font-family: "IBM Plex Mono", "Menlo", monospace;
        font-size: 1rem;
        letter-spacing: 0.04em;
      }

      .subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .status-pill {
        border: 1px solid rgba(13, 182, 216, 0.5);
        background: rgba(13, 182, 216, 0.12);
        color: #aff3ff;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.76rem;
        white-space: nowrap;
      }

      .status-pill.error {
        border-color: rgba(214, 60, 51, 0.7);
        background: rgba(214, 60, 51, 0.2);
        color: #ffd1cd;
      }

      .label {
        display: block;
        margin: 0 0 7px;
        color: var(--muted);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .row:last-child {
        margin-bottom: 0;
      }

      input,
      textarea,
      select,
      button {
        font: inherit;
      }

      input,
      textarea,
      select {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line-soft);
        background: rgba(8, 24, 35, 0.66);
        color: var(--text);
        padding: 10px;
      }

      input[type="checkbox"] {
        width: auto;
        margin: 0;
        padding: 0;
        accent-color: var(--accent);
      }

      input::placeholder,
      textarea::placeholder {
        color: #7ea1b6;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 10px 12px;
        color: #031019;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      button.ghost {
        color: #bfefff;
        border: 1px solid #2a637c;
        background: rgba(9, 41, 59, 0.7);
      }

      button.danger {
        color: #fff;
        background: linear-gradient(180deg, #dd5048, var(--danger));
      }

      button.mini {
        padding: 7px 10px;
        font-size: 0.78rem;
      }

      .button-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }

      .token-panel.compact .token-row {
        display: none;
      }

      .token-meta {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .token-panel.compact .token-meta {
        display: flex;
      }

      .session-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .session-chip {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--line-soft);
        background: rgba(5, 24, 35, 0.72);
        color: #d2eeff;
        font-family: "IBM Plex Mono", "Menlo", monospace;
        font-size: 0.77rem;
        cursor: pointer;
      }

      .session-chip.active {
        border-color: #29c5e7;
        background: rgba(13, 182, 216, 0.24);
      }

      .session-muted {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .toggle-inline {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .session-grid {
        display: grid;
        gap: 10px;
      }

      .session-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(7, 24, 34, 0.72);
        padding: 10px;
      }

      .session-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .session-name {
        font-family: "IBM Plex Mono", "Menlo", monospace;
        font-size: 0.83rem;
        color: #c9ecff;
        word-break: break-word;
      }

      .session-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .terminal {
        border: 1px solid var(--terminal-line);
        border-radius: 12px;
        min-height: 22vh;
        max-height: 42vh;
        overflow: auto;
        background: var(--terminal-bg);
        color: #ceffe8;
        padding: 9px;
        margin: 0 0 8px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.28;
        font-size: 0.84rem;
        font-family: "IBM Plex Mono", "Menlo", monospace;
      }

      .message-box {
        margin-bottom: 8px;
      }

      .message-box textarea {
        min-height: 82px;
      }

      @media (max-width: 820px) {
        .button-grid {
          grid-template-columns: 1fr;
        }

        .session-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .terminal {
          min-height: 18vh;
          max-height: 32vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel top">
        <div>
          <h1 class="title">Codex Remote</h1>
          <p class="subtitle">Interactive Multi Terminal Control</p>
        </div>
        <div class="status-pill" id="status">Booting...</div>
      </section>

      <section class="panel token-panel" id="tokenPanel">
        <label class="label">Access Token</label>
        <div class="row token-row" id="tokenRow">
          <input id="token" placeholder="Paste bearer token" />
          <button id="saveToken">Connect</button>
        </div>
        <div class="token-meta" id="tokenMeta">
          <span>Token saved on this device.</span>
          <button id="editToken" class="ghost mini">Edit</button>
        </div>
      </section>

      <section class="panel">
        <label class="label">Launch New Codex Terminal</label>
        <div class="row">
          <input id="cwd" placeholder="Repo path" />
        </div>
        <div class="row">
          <input id="initialPrompt" placeholder="Optional first message" />
        </div>
        <div class="row">
          <label class="session-muted toggle-inline">
            <input id="openOnMac" type="checkbox" checked />
            Open this session on Mac Terminal
          </label>
        </div>
        <div class="button-grid">
          <button id="start">Start New Codex</button>
          <button id="refresh" class="ghost">Refresh Sessions</button>
        </div>
      </section>

      <section class="panel">
        <label class="label">Available Codex Terminals</label>
        <div id="sessionStrip" class="session-strip"></div>
      </section>

      <section class="panel">
        <label class="label">Open Terminals</label>
        <div id="sessionGrid" class="session-grid"></div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const tokenEl = document.getElementById("token");
      const tokenPanelEl = document.getElementById("tokenPanel");
      const tokenRowEl = document.getElementById("tokenRow");
      const tokenMetaEl = document.getElementById("tokenMeta");
      const cwdEl = document.getElementById("cwd");
      const initialPromptEl = document.getElementById("initialPrompt");
      const openOnMacEl = document.getElementById("openOnMac");
      const sessionStripEl = document.getElementById("sessionStrip");
      const sessionGridEl = document.getElementById("sessionGrid");

      let token = "";
      let allSessions = [];
      let openSessions = [];
      let pollTimer = null;
      const pollInFlight = new Set();
      const sendInFlight = new Set();
      const sessionState = new Map();

      function setStatus(msg, isError = false) {
        statusEl.textContent = msg;
        statusEl.classList.toggle("error", isError);
      }

      function getTokenFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return (params.get("token") || "").trim();
      }

      function saveToken() {
        token = tokenEl.value.trim();
        if (!token) throw new Error("Token required");
        localStorage.setItem("codexremote_token", token);

        const params = new URLSearchParams(window.location.search);
        params.set("token", token);
        history.replaceState(null, "", `${window.location.pathname}?${params.toString()}`);
        updateTokenUi();
      }

      function updateTokenUi() {
        const connected = Boolean(token);
        tokenPanelEl.classList.toggle("compact", connected);
        tokenRowEl.hidden = connected;
        tokenMetaEl.hidden = !connected;
        tokenEl.type = connected ? "password" : "text";
      }

      async function api(path, options = {}) {
        if (!token) throw new Error("Token required");
        const headers = new Headers(options.headers || {});
        headers.set("Authorization", `Bearer ${token}`);
        headers.set("Content-Type", "application/json");

        const res = await fetch(path, { ...options, headers });
        if (!res.ok) {
          let detail = res.statusText;
          try {
            const body = await res.json();
            detail = body.detail || JSON.stringify(body);
          } catch (err) {
            // ignore parse failures
          }
          throw new Error(`${res.status} ${detail}`);
        }
        return res.json();
      }

      function idForSession(session) {
        return session.replace(/[^A-Za-z0-9_-]/g, "_");
      }

      function renderSessionStrip() {
        sessionStripEl.innerHTML = "";

        if (!allSessions.length) {
          const muted = document.createElement("div");
          muted.className = "session-muted";
          muted.textContent = "No sessions yet. Start one above.";
          sessionStripEl.appendChild(muted);
          return;
        }

        for (const session of allSessions) {
          const chip = document.createElement("button");
          chip.type = "button";
          chip.className = "session-chip" + (openSessions.includes(session) ? " active" : "");
          chip.dataset.session = session;
          chip.textContent = openSessions.includes(session) ? `Open · ${session}` : session;
          sessionStripEl.appendChild(chip);
        }
      }

      function renderSessionGrid() {
        sessionGridEl.innerHTML = "";

        if (!openSessions.length) {
          const muted = document.createElement("div");
          muted.className = "session-muted";
          muted.textContent = "Open a terminal from the session chips to control it here.";
          sessionGridEl.appendChild(muted);
          return;
        }

        for (const session of openSessions) {
          const sid = idForSession(session);
          const card = document.createElement("section");
          card.className = "session-card";
          card.dataset.session = session;
          card.innerHTML = `
            <div class="session-head">
              <div class="session-name">${session}</div>
              <div class="session-actions">
                <button class="ghost mini" data-action="openmac" data-session="${session}">Open on Mac</button>
                <button class="ghost mini" data-action="sync" data-session="${session}">Sync</button>
                <button class="danger mini" data-action="stop" data-session="${session}">Stop</button>
                <button class="ghost mini" data-action="hide" data-session="${session}">Hide</button>
              </div>
            </div>
            <pre id="term-${sid}" class="terminal"></pre>
            <div class="message-box">
              <textarea id="msg-${sid}" data-message-for="${session}" rows="2" placeholder="Message this terminal..."></textarea>
            </div>
            <div class="button-grid">
              <button data-action="send" data-session="${session}">Send</button>
              <button class="ghost" data-action="clear" data-session="${session}">Clear Box</button>
            </div>
          `;
          sessionGridEl.appendChild(card);

          const state = sessionState.get(session);
          if (state) {
            const termEl = document.getElementById(`term-${sid}`);
            if (termEl) {
              termEl.textContent = state.raw || "";
              termEl.scrollTop = termEl.scrollHeight;
            }
          }
        }
      }

      function ensureOpen(session) {
        if (!openSessions.includes(session)) {
          openSessions.unshift(session);
          renderSessionStrip();
          renderSessionGrid();
        }
      }

      function hideSession(session) {
        openSessions = openSessions.filter((s) => s !== session);
        renderSessionStrip();
        renderSessionGrid();
      }

      function upsertSessionState(session, raw) {
        const prev = sessionState.get(session);
        if (prev && prev.raw === raw) return;

        sessionState.set(session, { raw });

        const sid = idForSession(session);
        const termEl = document.getElementById(`term-${sid}`);
        if (termEl) {
          termEl.textContent = raw || "";
          termEl.scrollTop = termEl.scrollHeight;
        }
      }

      function setSessionBusy(session, busy) {
        const card = sessionGridEl.querySelector(`.session-card[data-session="${session}"]`);
        if (!card) return;
        const sendButton = card.querySelector('button[data-action="send"]');
        const box = card.querySelector('textarea[data-message-for]');
        if (sendButton) {
          sendButton.disabled = busy;
          sendButton.textContent = busy ? "Sending..." : "Send";
        }
        if (box) box.disabled = busy;
      }

      async function fetchTail(session, showErrors = false) {
        if (!session || pollInFlight.has(session)) return;
        pollInFlight.add(session);
        try {
          const data = await api(`/tmux/tail?session=${encodeURIComponent(session)}&lines=360`);
          upsertSessionState(session, data.output || "");
        } catch (err) {
          if (showErrors) setStatus(String(err.message || err), true);
        } finally {
          pollInFlight.delete(session);
        }
      }

      async function refreshSessions() {
        const data = await api("/codex/sessions");
        const sessions = (data.sessions || [])
          .slice()
          .sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
        allSessions = sessions.map((s) => s.name);

        openSessions = openSessions.filter((s) => allSessions.includes(s));
        if (!openSessions.length && allSessions.length) {
          openSessions = [allSessions[0]];
        }

        renderSessionStrip();
        renderSessionGrid();
        await Promise.all(openSessions.map((s) => fetchTail(s, false)));
      }

      function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(() => {
          for (const session of openSessions) {
            void fetchTail(session, false);
          }
        }, 1400);
      }

      async function startCodex() {
        setStatus("Starting session...");
        const cwd = cwdEl.value.trim() || null;
        const initialPrompt = initialPromptEl.value.trim() || null;
        const openOnMac = Boolean(openOnMacEl && openOnMacEl.checked);
        const data = await api("/codex/start", {
          method: "POST",
          body: JSON.stringify({ cwd, initial_prompt: initialPrompt, open_on_mac: openOnMac }),
        });

        if (!allSessions.includes(data.session)) {
          allSessions.unshift(data.session);
        }
        ensureOpen(data.session);
        upsertSessionState(data.session, data.tail || "");

        if (initialPromptEl.value.trim()) initialPromptEl.value = "";
        renderSessionStrip();
      }

      async function openOnMac(session) {
        await api("/mac/attach", {
          method: "POST",
          body: JSON.stringify({ session }),
        });
      }

      async function stopSession(session) {
        await api("/codex/stop", {
          method: "POST",
          body: JSON.stringify({ session, kill_session: false }),
        });
      }

      async function sendMessage(session) {
        const sid = idForSession(session);
        const box = document.getElementById(`msg-${sid}`);
        if (!box) return;
        if (sendInFlight.has(session)) return;

        const message = box.value.trim();
        if (!message) return;
        box.value = "";
        sendInFlight.add(session);
        setSessionBusy(session, true);

        try {
          setStatus(`Running ${session}...`);
          const data = await api("/codex/message", {
            method: "POST",
            body: JSON.stringify({ session, message }),
          });
          upsertSessionState(session, data.tail || "");
        } catch (err) {
          box.value = message;
          throw err;
        } finally {
          sendInFlight.delete(session);
          setSessionBusy(session, false);
        }
      }

      async function run(action) {
        try {
          await action();
          setStatus("Ready");
        } catch (err) {
          setStatus(String(err.message || err), true);
        }
      }

      document.getElementById("saveToken").addEventListener("click", () =>
        run(async () => {
          saveToken();
          await refreshSessions();
          startPolling();
          setStatus("Connected");
        })
      );

      document.getElementById("editToken").addEventListener("click", () => {
        token = "";
        localStorage.removeItem("codexremote_token");
        updateTokenUi();
        tokenEl.focus();
        setStatus("Enter token");
      });

      document.getElementById("start").addEventListener("click", () => run(startCodex));
      document.getElementById("refresh").addEventListener("click", () => run(refreshSessions));

      sessionStripEl.addEventListener("click", (event) => {
        const chip = event.target.closest("button[data-session]");
        if (!chip) return;

        const session = chip.dataset.session;
        if (!session) return;

        if (openSessions.includes(session)) {
          hideSession(session);
        } else {
          ensureOpen(session);
          void fetchTail(session, true);
        }
        renderSessionStrip();
      });

      sessionGridEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action][data-session]");
        if (!button) return;

        const action = button.dataset.action;
        const session = button.dataset.session;
        if (!action || !session) return;

        if (action === "send") {
          void run(async () => sendMessage(session));
        } else if (action === "sync") {
          void run(async () => fetchTail(session, true));
        } else if (action === "openmac") {
          void run(async () => openOnMac(session));
        } else if (action === "stop") {
          void run(async () => stopSession(session));
        } else if (action === "hide") {
          hideSession(session);
          renderSessionStrip();
        } else if (action === "clear") {
          const sid = idForSession(session);
          const box = document.getElementById(`msg-${sid}`);
          if (box) box.value = "";
        }
      });

      sessionGridEl.addEventListener("keydown", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLTextAreaElement)) return;
        const session = target.dataset.messageFor;
        if (!session) return;
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          void run(async () => sendMessage(session));
        }
      });

      (async () => {
        token = getTokenFromUrl() || localStorage.getItem("codexremote_token") || "";
        tokenEl.value = token;
        cwdEl.value = "/Users/desmondpottle/Documents/New project";
        updateTokenUi();

        if (!token) {
          setStatus("Paste token to connect");
          return;
        }

        try {
          await refreshSessions();
          startPolling();
          setStatus("Ready");
        } catch (err) {
          setStatus(String(err.message || err), true);
        }
      })();
    </script>
  </body>
</html>
